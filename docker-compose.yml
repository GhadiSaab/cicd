services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./build/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  city-api:
    build: ./city-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "2022:2022"
    depends_on:
      - db


volumes:
  db_data:
