---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up environnement
        run: |
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" > .env
          echo "POSTGRES_USER=${{ secrets.CITY_API_DB_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.CITY_API_DB_PWD }}" >> .env

      - name: Start database
        run: docker compose up -d db

      - name: Wait for PostgreSQL initialization
        run: |
          echo "Waiting for PostgreSQL to start and data to be imported..."
          until docker compose exec db psql -U ${{ secrets.CITY_API_DB_USER }} \
            -d ${{ secrets.POSTGRES_DB }} -c "SELECT count(*) FROM city;" \
            > /dev/null 2>&1; do
            sleep 3
          done
          echo "PostgreSQL is ready and data is imported!"

      - name: Run Maven tests
        env:
          CITY_API_ADDR: ${{ secrets.CITY_API_ADDR }}
          CITY_API_PORT: ${{ secrets.CITY_API_PORT }}
          CITY_API_DB_URL: ${{ secrets.CITY_API_DB_URL }}
          CITY_API_DB_USER: ${{ secrets.CITY_API_DB_USER }}
          CITY_API_DB_PWD: ${{ secrets.CITY_API_DB_PWD }}
        run: mvn test


  build:
    runs-on: ubuntu-latest
    needs: [quality, test]
    permissions:
      security-events: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with mvn
        run: ./mvnw package -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: >-
            ghcr.io/${{ github.repository_owner }}/${{
            github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        # We may need to specify which platform to scan using Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >-
            ghcr.io/${{ github.repository_owner }}/${{
            github.event.repository.name }}:latest
          format: 'sarif'  # SARIF format for GitHub Security tab upload
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'  # Flag critical and high CVEs only
          exit-code: '1'

      - name: Upload Trivy results to github security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
