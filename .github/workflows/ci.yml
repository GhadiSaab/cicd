---
name: CI

"on":
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'mvnw'
      - 'mvnw.cmd'
      - 'docker-compose.yml'
      - 'build/**'
      - '.github/workflows/**'
      - '.pre-commit-config.yaml'
      - 'renovate.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'mvnw'
      - 'mvnw.cmd'
      - 'docker-compose.yml'
      - 'build/**'
      - '.github/workflows/**'
      - '.pre-commit-config.yaml'
      - 'renovate.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up environnement
        run: |
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" > .env
          echo "POSTGRES_USER=${{ secrets.CITY_API_DB_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.CITY_API_DB_PWD }}" >> .env

      - name: Start database
        run: docker compose up -d db

      - name: Wait for PostgreSQL initialization
        run: |
          echo "Waiting for PostgreSQL to start and data to be imported..."
          until docker compose exec db psql -U ${{ secrets.CITY_API_DB_USER }} \
            -d ${{ secrets.POSTGRES_DB }} -c "SELECT count(*) FROM city;" \
            > /dev/null 2>&1; do
            sleep 3
          done
          echo "PostgreSQL is ready and data is imported!"

      - name: Run Maven tests
        env:
          CITY_API_ADDR: ${{ secrets.CITY_API_ADDR }}
          CITY_API_PORT: ${{ secrets.CITY_API_PORT }}
          CITY_API_DB_URL: jdbc:postgresql://localhost:5433/${{ secrets.POSTGRES_DB }}
          CITY_API_DB_USER: ${{ secrets.CITY_API_DB_USER }}
          CITY_API_DB_PWD: ${{ secrets.CITY_API_DB_PWD }}
        run: mvn test

      - name: Upload build target
        uses: actions/upload-artifact@v4
        with:
          name: maven-target
          path: target/
          retention-days: 1


  build:
    runs-on: ubuntu-latest
    needs: [quality, test]
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download build target
        uses: actions/download-artifact@v4
        with:
          name: maven-target
          path: target/

      - name: Build with mvn
        run: ./mvnw package -DskipTests -o

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Retag and push
        env:
          REPO: ${{ github.repository }}
        run: |
          SOURCE=ghcr.io/${REPO,,}:sha-${GITHUB_SHA::7}
          docker buildx imagetools create $SOURCE \
            $(echo '${{ steps.meta.outputs.tags }}' | sed 's/^/--tag /' | tr '\n' ' ')

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
